<script>

// FUNCTION FOR PAGE REDIRECTION
function goToPage(page) {
    window.location.href = page;
}

// TEXT SIZE BUTTONS
const buttons = document.querySelectorAll(".header button");

buttons.forEach(btn => {
    btn.addEventListener("click", () => {
        if (btn.textContent === "Large") {
            document.body.style.fontSize = "20px";
        } else if (btn.textContent === "Medium") {
            document.body.style.fontSize = "16px";
        } else {
            document.body.style.fontSize = "12px";
        }
    });
}); 

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}


const API_KEY = "931f146f1939c8bb2b348d000967674d";

// AUTO LOAD WEATHER
window.onload = () => {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            getWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
        });
    }
};

// FETCH USING COORDS (WITH PROXY FIX)
function getWeatherByCoords(lat, lon) {
    const url = `http://api.weatherstack.com/current?access_key=${API_KEY}&query=${lat},${lon}`;

    fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)
        .then(res => res.json())
        .then(data => {
            const weather = JSON.parse(data.contents);
            updateUI(weather);
        });
}

// SEARCH
function getWeather() {
    const city = document.getElementById("cityInput").value;
    const url = `http://api.weatherstack.com/current?access_key=${API_KEY}&query=${city}`;

    fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)
        .then(res => res.json())
        .then(data => {
            const weather = JSON.parse(data.contents);
            updateUI(weather);
        });
}

// UPDATE UI
function updateUI(data) {
    if (data.error) return alert("Location not found!");

    document.getElementById("cityName").innerText = data.location.name;
    document.getElementById("temperature").innerText = data.current.temperature + "°C";
    document.getElementById("condition").innerText = data.current.weather_descriptions[0];
    document.getElementById("weatherIcon").src = data.current.weather_icons[0];
}

</script>
